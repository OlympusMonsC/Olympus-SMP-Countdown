<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Olympus SMP Countdown</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: url('https://cdn.discordapp.com/attachments/1509799360643203132/1510242882399764520/alex_bittu_sky_1.png?ex=6a1c1aca&is=6a1ac94a&hm=79c1332707fad567f5e7018fd40a4e9e94ead2a4944fc0e342b3cdb6b9141534&') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 800;
        }

        #logo {
            width: 1100px;
            margin-bottom: 30px;
        }

        #countdown {
            font-size: 6rem;
            color: #ffffff;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.7);
            letter-spacing: 2px;
            text-align: center;
        }
    </style>
</head>
<body>

    <img id="logo" src="https://cdn.discordapp.com/attachments/1509799360643203132/1510244293883724016/logogogo.png?ex=6a1c1c1a&is=6a1aca9a&hm=ea89dcd5e2107ef42ccefa0fdea2d101a071daeebb548d6a7eb273695d4732cb&" alt="Olympus SMP Logo">
    <div id="countdown">Loading...</div>

    <script>
        const targetDate = new Date("2026-05-31T22:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                days + "d " + hours + "h " + minutes + "m " + seconds + "s";

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "SMP STARTED";
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
