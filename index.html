<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Olympus SMP Countdown</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: url('sky.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 800;
            position: relative;
            overflow: hidden;
        }

        .yass-icon {
            position: absolute;
            width: 80px;
            height: auto;
            cursor: pointer;
            z-index: 10;
            animation: flyUpAndSpin 5s linear forwards;
            pointer-events: auto;
        }

        @keyframes flyUpAndSpin {
            from { bottom: -100px; transform: rotate(0deg); }
            to { bottom: 110vh; transform: rotate(720deg); }
        }

        #mute-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 3rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
            z-index: 1000;
            outline: none;
        }

        #mute-btn:active { transform: scale(0.90); }

        #logo {
            width: 500px;
            margin-bottom: 30px;
            position: relative;
            z-index: 100;
        }

        #countdown {
            font-size: 6rem;
            color: #ffffff;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.7);
            letter-spacing: 2px;
            text-align: center;
            position: relative;
            z-index: 100;
        }

        #chat-container {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 320px;
            height: 400px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            font-weight: normal;
        }

        #chat-header {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9rem;
        }

        .chat-msg {
            word-break: break-word;
            line-height: 1.4;
        }

        .chat-user {
            font-weight: bold;
        }

        #chat-form {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
        }

        #chat-input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }

        #chat-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        #chat-submit {
            background: #4dabf7;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #chat-submit:hover {
            background: #3793dd;
        }
    </style>
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
</head>
<body>

    <button id="mute-btn">🔊</button>
    <audio id="bg-music" src="background.mp3" loop></audio>
    <img id="logo" src="logogogo.png" alt="Olympus SMP Logo">
    <div id="countdown">Loading...</div>

    <div id="chat-container">
        <div id="chat-header">Live Chat</div>
        <div id="chat-messages">
            <div class="chat-msg"><span class="chat-user" style="color: #51cf66">System:</span> Connecting to live room...</div>
        </div>
        <form id="chat-form">
            <input type="text" id="chat-input" maxlength="100" placeholder="Send a message..." autocomplete="off" required>
            <button type="submit" id="chat-submit">Send</button>
        </form>
    </div>

    <script>
        const CLIENT_ID = '3AAVFkezS7eNYLJF'; 
        const targetDate = new Date("2026-05-31T16:00:00-04:00").getTime(); 

        const BANNED_WORDS = [
            "fuck", "shit", "ass", "bitch", "cunt", "dick", "pussy", "nigger", "nigga", "faggot", 
            "kike", "retard", "slut", "whore", "bastard", "kanker", "tyfus", "homo", "nazi", "hitler"
        ];

        function cleanMessage(text) {
            let filteredText = text;
            BANNED_WORDS.forEach(word => {
                const regex = new RegExp(`\\b${word}\\b|${word}`, 'gi');
                filteredText = filteredText.replace(regex, "****");
            });
            return filteredText;
        }

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "SMP STARTED";
            } else {
                document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s";
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");
        const chatMessages = document.getElementById("chat-messages");

        const chatColors = ["#4dabf7", "#ffc078", "#ff8787", "#da77f2", "#94d82d", "#ffd43b", "#a9e34b"];
        const myColor = chatColors[Math.floor(Math.random() * chatColors.length)];
        const myUsername = "User_" + Math.floor(1000 + Math.random() * 9000);

        const drone = new ScaleDrone(CLIENT_ID);
        let room;

        drone.on('open', error => {
            if (error) return console.error(error);
            room = drone.subscribe('olympus-room');
            
            room.on('open', error => {
                if (!error) {
                    document.getElementById("chat-messages").innerHTML = `<div class="chat-msg"><span class="chat-user" style="color: #51cf66">System:</span> Connected to Live Chat!</div>`;
                }
            });

            room.on('data', (data, client) => {
                const name = data.name || "Anonymous";
                const color = data.color || "#ffffff";
                const filteredMsg = cleanMessage(data.message);
                appendMessage(name, filteredMsg, color);
            });
        });

        chatForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const messageText = chatInput.value.trim();
            if(!messageText || !room) return;

            drone.publish({
                room: 'olympus-room',
                message: {
                    name: myUsername,
                    color: myColor,
                    message: messageText
                }
            });
            chatInput.value = "";
        });

        function appendMessage(user, text, color) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg";
            msgDiv.innerHTML = `<span class="chat-user" style="color: ${color}">${user}:</span> ${escapeHTML(text)}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function createYassImage() {
            if (document.querySelectorAll('.yass-icon').length < 12) {
                const img = document.createElement('img');
                const images = ["face (10).png", "face (11).png", "face (12).png", "face.png", "femboy.png", "face (1).png", "face (2).png", "face (3).png", "face (4).png", "face (5).png", "face (9).png", "face (6).png", "face (7).png", "face (8).png", "star.png", "syp.png", "yass.png"];
                const randomImage = images[images.length * Math.random() | 0];
                img.src = randomImage; 
                img.className = 'yass-icon';
                img.style.left = Math.random() * 80 + 5 + 'vw';
                img.addEventListener('click', () => img.remove());
                img.addEventListener('animationend', () => img.remove());
                document.body.appendChild(img);
            }
        }
        setInterval(createYassImage, 2000);

        const audio = document.getElementById("bg-music");
        const muteBtn = document.getElementById("mute-btn");
        audio.volume = 0.4; 

        function startAudio() {
            audio.play().then(() => {
                document.removeEventListener('click', startAudio);
                document.removeEventListener('keydown', startAudio);
            }).catch(e => console.log("Playback prevented"));
        }
        document.addEventListener('click', startAudio);
        document.addEventListener('keydown', startAudio);

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (audio.paused) startAudio();
            if (audio.muted) { audio.muted = false; muteBtn.innerText = "🔊"; }
            else { audio.muted = true; muteBtn.innerText = "🔇"; }
        });
    </script>
</body>
</html>
